<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect World</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="screen active" style="justify-content:center; align-items:center;">
        <h1 style="color:var(--accent); font-size:3rem;">CW</h1>
        <p>Connecting the World...</p>
    </div>

    <!-- Login/Signup Screen -->
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <div class="glass-card">
                <h2 id="auth-title">Welcome</h2>
                <p id="auth-desc">Login to your account</p>
                <div class="input-group">
                    <input type="tel" id="phone-number" placeholder="Phone Number">
                    <input type="password" id="password" placeholder="Password">
                    <input type="password" id="confirm-password" class="hidden" placeholder="Confirm Password">
                    <button id="auth-main-btn">Login</button>
                </div>
                <p id="toggle-auth-btn" style="margin-top:20px; color:var(--accent); cursor:pointer;">
                    Don't have an account? <b>Sign Up</b>
                </p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-screen" class="screen">
        <header style="padding:20px; border-bottom: 1px solid var(--glass-border); display:flex; justify-content:space-between;">
            <h2 id="page-title">Chats</h2>
            <i class="fas fa-search"></i>
        </header>

        <div id="main-content" style="flex:1; overflow-y:auto; padding-bottom:80px;">
            <!-- Content will load here -->
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" data-section="chats"><i class="fas fa-comment"></i>Chats</div>
            <div class="nav-item" data-section="friends"><i class="fas fa-users"></i>Friends</div>
            <div class="nav-item" data-section="stories"><i class="fas fa-circle-notch"></i>Stories</div>
            <div class="nav-item" data-section="profile"><i class="fas fa-user"></i>Profile</div>
        </nav>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
