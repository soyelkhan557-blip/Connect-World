<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect World</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">

<h1>🌍 Connect World</h1>

<input id="phone" type="text" placeholder="Enter Mobile Number">

<button id="loginBtn">Login / Sign Up</button>

<hr>

<button id="myIdBtn">My ID</button>

<button id="addFriendBtn">Add Friend</button>

<button id="chatBtn">Chats</button>

<button id="storyBtn">Story</button>

<button id="profileBtn">Profile</button>

<hr>

<div id="friendList"></div>

<div id="chatBox"></div>

<input id="messageInput" type="text" placeholder="Type Message">

<button id="sendBtn">Send</button>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
