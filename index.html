<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect World</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <div id="splash-screen" class="screen active">
        <div class="loader-content">
            <div class="app-logo">CW</div>
            <h1>Connect World</h1>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Auth Screen (Updated for Phone + Password) -->
    <div id="auth-screen" class="screen">
        <div class="glass-card">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-desc">Login with your phone number</p>
            
            <div class="input-group">
                <input type="tel" id="phone-number" placeholder="Phone Number">
                <input type="password" id="password" placeholder="Password">
                <input type="password" id="confirm-password" class="hidden" placeholder="Confirm Password">
                
                <button id="auth-main-btn">Login</button>
            </div>
            
            <p class="toggle-auth" id="toggle-auth-btn" style="margin-top:15px; cursor:pointer; color:var(--accent-color);">
                Don't have an account? <span>Sign Up</span>
            </p>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="screen">
        <header class="glass-header">
            <h2 id="page-title">Chats</h2>
            <div class="header-actions">
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </header>

        <main id="main-content"></main>

        <nav class="bottom-nav">
            <div class="nav-item active" data-section="chats"><i class="fas fa-comment-alt"></i><span>Chats</span></div>
            <div class="nav-item" data-section="friends"><i class="fas fa-user-friends"></i><span>Friends</span></div>
            <div class="nav-item" data-section="stories"><i class="fas fa-circle-notch"></i><span>Stories</span></div>
            <div class="nav-item" data-section="calls"><i class="fas fa-phone-alt"></i><span>Calls</span></div>
            <div class="nav-item" data-section="profile"><i class="fas fa-user-circle"></i><span>Profile</span></div>
        </nav>
    </div>

    <!-- Chat Overlay -->
    <div id="chat-view" class="overlay-screen">
        <header class="glass-header">
            <i class="fas fa-arrow-left" id="close-chat"></i>
            <div class="user-info">
                <img src="https://via.placeholder.com/40" id="chat-user-img">
                <div><h4 id="chat-user-name">User</h4><small id="chat-user-status">Online</small></div>
            </div>
        </header>
        <div id="message-list"></div>
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Type a message...">
            <button id="send-msg-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
